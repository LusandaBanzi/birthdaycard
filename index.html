<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Mam'Nkosi ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    overflow:hidden;
    height:100vh;
    background:#000;
}

/* OPEN SCREEN */

.start-screen{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:linear-gradient(
        135deg,
        #ff6b9d,
        #ff9a9e,
        #fad0c4
    );
    z-index:999;
}

.start-screen h1{
    color:white;
    margin-bottom:30px;
    text-align:center;
    font-size:2.5rem;
    text-shadow:0 0 20px rgba(255,255,255,.5);
}

#openBtn{
    padding:18px 45px;
    border:none;
    border-radius:50px;
    font-size:1.2rem;
    cursor:pointer;
    background:white;
    color:#ff4f81;
    font-weight:bold;
    transition:.4s;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

#openBtn:hover{
    transform:scale(1.08);
}

/* MAIN */

.container{
    position:relative;
    width:100%;
    height:100vh;
    display:none;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* Background image */
.bg{
    position:absolute;
    inset:0;
    background:url("mamnkosi.jpg") center center/cover no-repeat;
    filter:blur(5px) brightness(.45);
    transform:scale(1.1);
}

.overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(
        rgba(0,0,0,.2),
        rgba(0,0,0,.6)
    );
}

.card{
    position:relative;
    z-index:10;
    width:90%;
    max-width:750px;
    padding:35px;
    border-radius:30px;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(15px);
    text-align:center;
    color:white;
    box-shadow:0 0 50px rgba(255,255,255,.2);
    animation:cardEntrance 2s ease;
}

@keyframes cardEntrance{
    from{
        opacity:0;
        transform:translateY(80px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.photo-frame{
    width:220px;
    height:220px;
    border-radius:50%;
    overflow:hidden;
    margin:auto;
    border:6px solid rgba(255,255,255,.5);
    box-shadow:0 0 35px rgba(255,255,255,.4);
    animation:glow 3s infinite;
}

.photo-frame img{
    width:100%;
    height:100%;
    object-fit:cover;
}

@keyframes glow{
    50%{
        box-shadow:0 0 60px rgba(255,255,255,.8);
    }
}

h1{
    margin-top:20px;
    margin-bottom:20px;
    color:#fff7d6;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    50%{
        transform:scale(1.05);
    }
}

#message{
    min-height:140px;
    font-size:1.3rem;
    line-height:1.8;
    font-weight:500;
}

.signature{
    margin-top:20px;
    font-size:1.5rem;
    color:#ffd700;
    font-weight:bold;
}

/* BALLOONS */

.balloon{
    position:absolute;
    bottom:-150px;
    font-size:3rem;
    animation:floatUp linear infinite;
    opacity:.8;
}

@keyframes floatUp{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-130vh);
    }
}

/* HEARTS */

.heart{
    position:absolute;
    color:#ff4f81;
    animation:hearts linear infinite;
}

@keyframes hearts{
    from{
        transform:translateY(0) rotate(0deg);
        opacity:1;
    }
    to{
        transform:translateY(-120vh) rotate(360deg);
        opacity:0;
    }
}

/* SPARKLES */

.sparkle{
    position:absolute;
    color:white;
    animation:sparkle 5s linear infinite;
}

@keyframes sparkle{
    50%{
        transform:scale(1.8);
    }
}

@media(max-width:768px){

    .photo-frame{
        width:170px;
        height:170px;
    }

    h1{
        font-size:1.6rem;
    }

    #message{
        font-size:1rem;
    }
}
</style>
</head>

<body>

<audio id="music" loop>
    <source src="birthdaysong.mp3" type="audio/mpeg">
</audio>

<!-- OPEN PAGE -->

<div class="start-screen" id="startScreen">
    <h1>🎂 Happy Birthday Mam'Nkosi ❤️</h1>
    <button id="openBtn">🎁 Open Your Birthday Card</button>
</div>

<!-- MAIN CARD -->

<div class="container" id="container">

    <div class="bg"></div>
    <div class="overlay"></div>

    <div class="card">

        <div class="photo-frame">
            <img src="WhatsApp Image 2026-06-10 at 20.03.50.jpeg" alt="Mam'Nkosi">
        </div>

        <h1>Happy Birthday Mam'Nkosi ❤️</h1>

        <div id="message"></div>

        <div class="signature">
            With Love, Lusanda ❤️
        </div>

    </div>

</div>

<script>
const openBtn = document.getElementById("openBtn");
const startScreen = document.getElementById("startScreen");
const container = document.getElementById("container");
const music = document.getElementById("music");
const messageBox = document.getElementById("message");

/* Birthday Messages */

const messages = [

"Today is a very special day because we celebrate an amazing woman.",

"Happy Birthday Mam'Nkosi ❤️",

"May God bless you with good health, endless happiness and abundant favor.",

"May every prayer you have made be answered beyond your expectations.",

"You are appreciated more than words can express.",

"May your smile shine brighter than ever this year.",

"May your days be filled with peace, love and beautiful memories.",

"Thank you for being a blessing to so many lives.",

"May God's grace continue to guide and protect you every day.",

"Enjoy every moment of your special day.",

"Happy Birthday once again Mam'Nkosi ❤️",

"With all my love and warm wishes...",

"From Lusanda ❤️"
];

let index = 0;

/* Typewriter Effect */

function typeWriter(text, callback){

    let i = 0;
    messageBox.innerHTML = "";

    let typing = setInterval(() => {

        messageBox.innerHTML += text.charAt(i);
        i++;

        if(i >= text.length){
            clearInterval(typing);

            setTimeout(() => {
                callback();
            }, 2500);
        }

    }, 50);
}

function showMessages(){

    if(index < messages.length){

        typeWriter(messages[index], () => {
            index++;
            showMessages();
        });

    }
}

/* Floating Hearts */

function createHeart(){

    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";

    heart.style.left = Math.random()*100 + "vw";
    heart.style.bottom = "-50px";
    heart.style.fontSize = (20 + Math.random()*25) + "px";
    heart.style.animationDuration = (6 + Math.random()*5) + "s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },12000);
}

/* Balloons */

function createBalloon(){

    const emojis = ["🎈","🎈","🎈","🎉","🎊"];

    let balloon = document.createElement("div");

    balloon.className = "balloon";
    balloon.innerHTML =
    emojis[Math.floor(Math.random()*emojis.length)];

    balloon.style.left =
    Math.random()*100 + "vw";

    balloon.style.animationDuration =
    (8 + Math.random()*6) + "s";

    document.body.appendChild(balloon);

    setTimeout(()=>{
        balloon.remove();
    },15000);
}

/* Sparkles */

function createSparkle(){

    let sparkle = document.createElement("div");

    sparkle.className = "sparkle";
    sparkle.innerHTML = "✨";

    sparkle.style.left =
    Math.random()*100 + "vw";

    sparkle.style.top =
    Math.random()*100 + "vh";

    sparkle.style.fontSize =
    (10 + Math.random()*20) + "px";

    document.body.appendChild(sparkle);

    setTimeout(()=>{
        sparkle.remove();
    },5000);
}

/* Open Card */

openBtn.addEventListener("click", () => {

    startScreen.style.display = "none";
    container.style.display = "flex";

    music.play();

    showMessages();

    setInterval(createHeart, 400);
    setInterval(createBalloon, 1500);
    setInterval(createSparkle, 300);

});
</script>

</body>
</html>
